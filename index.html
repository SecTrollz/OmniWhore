 <!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniView — Asset Intelligence (Production)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    :root{--black:#000;--coal:#0c0d0f;--bg:#0c0d0f;--surface:#16181c;--surface2:#1e2127;--surface3:#262a31;--border:#2b2f37;--border2:#383d47;--text:#e8e9ec;--text2:#9aa0ab;--text3:#62686f;--orange:#ff6b1a;--orange-bg:#2a1407;--orange-dim:#c4561a;--yellow:#ffc11f;--yellow-bg:#2a2207;--green:#2fd66b;--green-bg:#07260f;--red:#ff3b3b;--red-bg:#2a0808;--blue:#2f80ff;--blue-bg:#081428;--purple:#a855f7;--purple-bg:#1b0d2a;--mono:'SF Mono','Cascadia Code','Consolas','Courier New',monospace;--sans:'Inter','Segoe UI',system-ui,sans-serif;--radius:6px;--radius-sm:3px;--shadow:0 4px 28px rgba(0,0,0,.6);--glass:rgba(22,24,28,.92);}
    [data-theme="light"]{--bg:#e9ebee;--coal:#e9ebee;--surface:#fff;--surface2:#f3f4f7;--surface3:#e7e9ee;--border:#d6dae1;--border2:#c2c8d2;--text:#16181c;--text2:#5a616b;--text3:#8b929c;--orange-bg:#fff0e6;--yellow-bg:#fff8e0;--green-bg:#e6f7ec;--red-bg:#fde8e8;--blue-bg:#e7f0ff;--purple-bg:#f3e8ff;--shadow:0 4px 28px rgba(0,0,0,.1);--glass:rgba(255,255,255,.92);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh;position:relative;transition:background .3s,color .3s;}
    ::selection{background:#ff6b1a40;}
    #hexCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;}
    #loadingOverlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s;}
    #loadingOverlay.hidden{opacity:0;pointer-events:none;}
    .loader-spinner{width:48px;height:48px;border:4px solid var(--border2);border-top:4px solid var(--orange);border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .progress-bar{width:220px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;width:0%;background:var(--orange);transition:width .3s;}
    #loadingText{color:var(--text2);font-family:var(--mono);font-size:.8rem;}
    .app-wrap{position:relative;z-index:1;}
    ::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--orange-dim);}
    .warning-banner{background:var(--red-bg);border-bottom:1px solid #ff3b3b40;padding:10px 18px;font-size:.8rem;color:#ff9b9b;font-family:var(--mono);}
    .topnav{background:var(--glass);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:18px;padding:0 18px;height:48px;position:sticky;top:0;z-index:1000;}
    .brand{font-weight:800;font-size:1.15rem;letter-spacing:-.02em;color:var(--orange);white-space:nowrap;cursor:pointer;}
    .brand span{color:var(--text);font-weight:400;}
    .topnav-links{display:flex;gap:16px;font-size:.82rem;}
    .topnav-links a{color:var(--text2);text-decoration:none;cursor:pointer;padding:2px 0;border-bottom:2px solid transparent;transition:.15s;}
    .topnav-links a:hover,.topnav-links a.active{color:var(--text);border-bottom-color:var(--orange);}
    .topnav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .icon-btn{border:1px solid var(--border2);background:var(--surface2);color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:.15s;}
    .icon-btn:hover{border-color:var(--orange);}
    .chain-badge{font-family:var(--mono);font-size:.68rem;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;}
    .chain-badge.ok{border-color:#2fd66b40;color:var(--green);}
    .chain-badge.bad{border-color:#ff3b3b40;color:var(--red);}
    .chain-badge .cb-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}
    .search-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;gap:8px;align-items:center;}
    .search-wrap{flex:1;position:relative;}
    .search-box{width:100%;background:var(--coal);border:2px solid var(--border2);border-radius:var(--radius);padding:11px 16px;font-family:var(--mono);font-size:.92rem;color:var(--text);outline:none;transition:.2s;}
    .search-box:focus{border-color:var(--orange);box-shadow:0 0 0 4px #ff6b1a22;}
    .search-btn{background:var(--orange);color:var(--black);border:none;border-radius:var(--radius);padding:11px 22px;font-weight:700;font-size:.9rem;cursor:pointer;transition:.15s;}
    .search-btn:hover{background:#ff7d33;}
    .search-meta{padding:6px 18px 0;font-size:.72rem;color:var(--text3);font-family:var(--mono);}
    .search-meta b{color:var(--yellow);font-weight:600;}
    .results-toolbar{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .total-results{font-size:1.45rem;font-weight:700;font-family:var(--mono);color:var(--text);}
    .total-results small{font-size:.8rem;color:var(--text3);font-weight:400;margin-left:6px;}
    .toolbar-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
    .tb-btn{padding:7px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:.8rem;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);white-space:nowrap;transition:.15s;}
    .tb-btn:hover{border-color:var(--orange-dim);background:var(--surface3);}
    .tb-btn.primary{background:var(--orange);color:var(--black);border-color:var(--orange);}
    .tb-btn.primary:hover{background:#ff7d33;}
    .tb-btn.green-export{border-color:var(--green);color:var(--green);}
    .tb-btn.green-export:hover{background:var(--green-bg);}
    .shodan-grid{display:grid;grid-template-columns:260px 1fr;gap:0;}
    @media(max-width:880px){.shodan-grid{grid-template-columns:1fr;}.facet-sidebar{border-right:none!important;border-bottom:1px solid var(--border);}}
    .facet-sidebar{border-right:1px solid var(--border);padding:16px 14px;min-height:60vh;}
    .facet-block{margin-bottom:22px;}
    .facet-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;color:var(--orange);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
    .facet-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 6px;border-radius:var(--radius-sm);cursor:pointer;font-size:.8rem;transition:.12s;}
    .facet-row:hover{background:var(--surface2);}
    .facet-row.active{background:var(--orange-bg);}
    .facet-label{font-family:var(--mono);color:var(--text);display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .facet-count{font-family:var(--mono);color:var(--text3);font-size:.74rem;flex-shrink:0;}
    .facet-row.active .facet-count{color:var(--orange);}
    .facet-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .results-col{padding:14px 18px;min-width:0;}
    .banner-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;display:grid;grid-template-columns:230px 1fr;overflow:hidden;transition:.15s;}
    .banner-card:hover{border-color:var(--orange-dim);box-shadow:var(--shadow);}
    .banner-card.is-decom{opacity:.55;}
    .banner-card.is-rogue{border-left:3px solid var(--purple);}
    .banner-card.is-discovered{border-left:3px solid var(--orange);}
    .banner-card.is-foreign{border-left:3px solid var(--blue);}
    @media(max-width:560px){.banner-card{grid-template-columns:1fr;}}
    .banner-meta{padding:14px 16px;border-right:1px solid var(--border);background:var(--surface2);}
    @media(max-width:560px){.banner-meta{border-right:none;border-bottom:1px solid var(--border);}}
    .banner-ip{font-family:var(--mono);font-size:1.2rem;font-weight:700;color:var(--orange);letter-spacing:-.01em;margin-bottom:2px;cursor:pointer;word-break:break-all;}
    .banner-ip:hover{text-decoration:underline;}
    .banner-host{font-family:var(--mono);font-size:.74rem;color:var(--text2);margin-bottom:10px;word-break:break-all;}
    .banner-metarow{font-size:.76rem;color:var(--text2);display:flex;gap:6px;margin:3px 0;align-items:flex-start;}
    .banner-metarow .k{color:var(--text3);min-width:62px;flex-shrink:0;}
    .banner-metarow .v{font-family:var(--mono);color:var(--text);word-break:break-all;}
    .banner-flag{font-size:.95rem;}
    .banner-ts{font-size:.68rem;color:var(--text3);font-family:var(--mono);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);}
    .banner-body{padding:12px 14px;min-width:0;display:flex;flex-direction:column;}
    .banner-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
    .tag{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:20px;font-family:var(--sans);white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
    .tag-status-active{background:var(--green-bg);color:var(--green);border:1px solid #2fd66b40;}
    .tag-status-maintenance{background:var(--yellow-bg);color:var(--yellow);border:1px solid #ffc11f40;}
    .tag-status-decommissioned{background:var(--red-bg);color:#ff7676;border:1px solid #ff3b3b40;}
    .tag-status-rogue{background:var(--purple-bg);color:#c89bf7;border:1px solid #a855f740;}
    .tag-status-discovered{background:var(--orange-bg);color:#ff9a52;border:1px solid #ff6b1a40;}
    .tag-peer{background:var(--blue-bg);color:#92bbff;border:1px solid #2f80ff40;}
    .tag-svc{background:var(--surface3);color:var(--text2);border:1px solid var(--border2);cursor:pointer;}
    .tag-svc:hover{border-color:var(--orange);color:var(--orange);}
    .tag-port{background:var(--coal);color:var(--blue);border:1px solid #2f80ff40;font-family:var(--mono);cursor:pointer;}
    .tag-port:hover{background:var(--blue-bg);}
    .banner-blob{background:var(--black);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--mono);font-size:.72rem;color:#9fb4c9;padding:10px 12px;white-space:pre-wrap;word-break:break-all;flex:1;line-height:1.5;overflow:auto;max-height:210px;}
    .blob-key{color:var(--text3);}.blob-str{color:var(--green);}.blob-num{color:var(--yellow);}
    .banner-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
    .ba-btn{padding:4px 10px;font-size:.72rem;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:.15s;}
    .ba-btn:hover{border-color:var(--orange);}
    .ba-btn.danger{border-color:var(--red);color:#ff7676;}.ba-btn.danger:hover{background:var(--red-bg);}
    .ba-btn.enroll{border-color:var(--orange);color:var(--orange);}.ba-btn.enroll:hover{background:var(--orange-bg);}
    .pulse-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
    .pulse-dot.green{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 1.8s ease-in-out infinite;}
    .pulse-dot.red{background:var(--red);border-radius:1px;}.pulse-dot.yellow{background:var(--yellow);}
    .pulse-dot.purple{background:var(--purple);animation:pulse 1s infinite;}.pulse-dot.orange{background:var(--orange);}.pulse-dot.blue{background:var(--blue);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
    .empty-results{padding:50px 20px;text-align:center;color:var(--text3);}
    .empty-results code{font-family:var(--mono);background:var(--surface2);color:var(--yellow);padding:2px 8px;border-radius:3px;}
    .alerts-bar{padding:0 18px;}
    .alert-item{padding:8px 12px;border-radius:var(--radius-sm);font-size:.78rem;font-family:var(--mono);display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:6px;border:1px solid transparent;}
    .alert-item.critical{background:var(--red-bg);border-color:#ff3b3b40;color:#ff9b9b;}
    .alert-item.warning{background:var(--orange-bg);border-color:#ff6b1a40;color:#ffb27a;}
    .alert-item.info{background:var(--blue-bg);border-color:#2f80ff40;color:#92bbff;}
    .alert-item.success{background:var(--green-bg);border-color:#2fd66b40;color:#7fe0a0;}
    .alert-dismiss{margin-left:auto;background:none;border:none;color:inherit;cursor:pointer;opacity:.6;font-size:1rem;}
    .alert-dismiss:hover{opacity:1;}
    .map-view{padding:14px 18px;}
    #leafletMap{width:100%;height:64vh;border-radius:var(--radius);border:1px solid var(--border);background:var(--coal);}
    .leaflet-container{background:var(--coal)!important;font-family:var(--sans);}
    .leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius-sm);}
    .leaflet-popup-tip{background:var(--surface);border:1px solid var(--border2);}
    .leaflet-popup-content{font-family:var(--mono);font-size:.74rem;}
    .map-legend{display:flex;flex-wrap:wrap;gap:12px;padding:10px 2px;font-size:.7rem;font-family:var(--mono);color:var(--text2);}
    .map-legend span{display:inline-flex;align-items:center;gap:5px;}
    .lg-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
    .map-note{font-size:.72rem;color:var(--text3);padding:2px 2px 0;}
    .hidden{display:none!important;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:2000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);}
    .modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:24px;width:90%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.7);max-height:85vh;overflow-y:auto;position:relative;}
    .modal h3{font-size:1.1rem;margin-bottom:14px;}
    .modal h3.orange{color:var(--orange);}.modal h3.red{color:var(--red);}
    .modal label{display:block;font-weight:600;font-size:.78rem;margin:12px 0 4px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;}
    .modal select,.modal input[type=text],.modal textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:.85rem;}
    .modal select:focus,.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px #ff6b1a22;}
    .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap;}
    .close-modal{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:1.4rem;cursor:pointer;}
    .close-modal:hover{color:var(--orange);}
    .help-section{margin-bottom:18px;}
    .help-section h4{font-size:.92rem;color:var(--orange);margin-bottom:7px;border-bottom:1px solid var(--border);padding-bottom:5px;}
    .help-section p{font-size:.84rem;color:var(--text2);margin-bottom:7px;}
    .help-section code{font-family:var(--mono);background:var(--surface2);color:var(--yellow);padding:1px 6px;border-radius:3px;font-size:.78rem;border:1px solid var(--border);}
    .help-table{width:100%;border-collapse:collapse;font-size:.8rem;}
    .help-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
    .help-table td:first-child{font-family:var(--mono);color:var(--yellow);white-space:nowrap;width:130px;}
    .help-legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-top:8px;}
    .help-legend-grid span{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--text2);}
    .btn-primary{background:var(--orange);color:var(--black);border:none;border-radius:var(--radius-sm);padding:8px 16px;font-weight:600;cursor:pointer;}
    .btn-danger{background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-weight:600;cursor:pointer;}
    .btn-flat{background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 16px;font-weight:600;cursor:pointer;}
    .ledger-view{padding:14px 18px;}
    .ledger-head{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
    .ledger-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;}
    .ledger-stat .v{font-family:var(--mono);font-size:1.3rem;font-weight:700;}
    .ledger-stat .l{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);}
    .ledger-head-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
    .ident-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-family:var(--mono);font-size:.72rem;color:var(--text2);word-break:break-all;}
    .ident-strip b{color:var(--yellow);}
    .ident-strip .lbl{color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-size:.66rem;}
    .entry{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border2);border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-family:var(--mono);font-size:.74rem;}
    .entry.genesis{border-left-color:var(--text3);}.entry.create{border-left-color:var(--orange);}.entry.enroll{border-left-color:var(--green);}.entry.retire{border-left-color:var(--red);}.entry.import{border-left-color:var(--blue);}.entry.update{border-left-color:var(--yellow);}.entry.anchor{border-left-color:var(--purple);}.entry.broken{border-left-color:var(--red);background:var(--red-bg);}
    .entry-top{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:baseline;}
    .entry-op{font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
    .entry-op.create{color:var(--orange);}.entry-op.enroll{color:var(--green);}.entry-op.retire{color:#ff7676;}.entry-op.import{color:#92bbff;}.entry-op.update{color:var(--yellow);}.entry-op.anchor{color:#c89bf7;}.entry-op.genesis{color:var(--text2);}
    .entry-time{color:var(--text3);font-size:.7rem;}
    .entry-body{color:var(--text2);margin-top:4px;}
    .entry-hash{color:var(--text3);font-size:.66rem;margin-top:5px;word-break:break-all;}
    .entry-hash b{color:var(--yellow);}
    .toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 20px;font-family:var(--mono);font-size:.8rem;z-index:3000;box-shadow:var(--shadow);max-width:380px;}
    .toast.success{border-left:4px solid var(--green);}.toast.error{border-left:4px solid var(--red);}.toast.info{border-left:4px solid var(--blue);}.toast.warning{border-left:4px solid var(--orange);}
</style>
</head>
<body>
<div id="loadingOverlay"><div class="loader-spinner"></div><div id="loadingText">Loading OmniView…</div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
<canvas id="hexCanvas"></canvas>
<div class="app-wrap">
    <div id="cryptoWarning" class="warning-banner hidden">⚠ WebCrypto unavailable — OmniView cannot run securely in this browser. No mock signing is used.</div>
    <nav class="topnav">
        <div class="brand" id="brandHome">Omni<span>View</span></div>
        <div class="topnav-links"><a id="navResults" class="active">Results</a><a id="navMaps">Maps</a><a id="navLedger">Ledger</a><a id="navHelp">Help</a></div>
        <div class="topnav-right"><span class="chain-badge" id="chainBadge" title="Signed ledger status"><span class="cb-dot"></span><span id="chainBadgeTxt">chain —</span></span><button class="icon-btn" id="themeToggle" title="Toggle theme">🌓</button></div>
    </nav>
    <div id="alertsContainer" class="alerts-bar"></div>
    <div id="viewResults">
        <div class="search-strip"><div class="search-wrap"><input type="text" class="search-box" id="searchBox" placeholder="Search assets… IP, hostname, service, country, org…" autofocus></div><button class="search-btn" id="searchBtn">Search</button></div>
        <div class="search-meta" id="searchMeta"></div>
        <div class="results-toolbar"><div class="total-results" id="totalResults">0 <small>assets</small></div><div class="toolbar-actions"><button class="tb-btn primary" id="btnAddAsset">＋ Add Asset</button><button class="tb-btn green-export" id="btnExport">⤓ Export Ledger</button><button class="tb-btn" id="btnImport">⤒ Import</button><button class="tb-btn" id="btnClearFilters">Clear Filters</button></div></div>
        <div class="shodan-grid"><div class="facet-sidebar" id="facetSidebar"></div><div class="results-col" id="resultsColumn"></div></div>
    </div>
    <div id="viewMaps" class="hidden"><div class="map-view"><div class="map-legend" id="mapLegend"></div><div id="leafletMap"></div><div class="map-note" id="mapNote"></div></div></div>
    <div id="viewLedger" class="hidden"><div class="ledger-view">

function canon(v){
    if(Array.isArray(v))return '['+v.map(canon).join(',')+']';
    if(v&&typeof v==='object')return '{'+Object.keys(v).sort().map(k=>JSON.stringify(k)+':'+canon(v[k])).join(',')+'}';
    return JSON.stringify(v);
}
async function hashData(o){return sha256hex(canon(o));}
async function merkleRoot(leaves){if(!leaves.length)return '0'.repeat(64);let lvl=[...leaves];while(lvl.length>1){const nx=[];for(let i=0;i<lvl.length;i+=2){const a=lvl[i],b=(i+1<lvl.length)?lvl[i+1]:lvl[i];nx.push(await sha256hex(a+b));}lvl=nx;}return lvl[0];}

// ---------- FIXED shared genesis (identical hash on every node) ----------
const GENESIS={index:0,timestamp:0,operation:'genesis',author:'GENESIS',payload:{v:'omniview-ledger-1'},prevHash:'0'.repeat(64)};
let GENESIS_HASH=null;
async function genesisHash(){if(!GENESIS_HASH)GENESIS_HASH=await hashData(coreOf(GENESIS));return GENESIS_HASH;}
function coreOf(b){return {index:b.index,timestamp:b.timestamp,operation:b.operation,author:b.author,payload:b.payload,prevHash:b.prevHash};}

// ---------- durable atomic storage ----------
const DB={
    set(key,obj){const str=JSON.stringify(obj),tmp=key+'__tmp',bak=key+'__bak';
        try{localStorage.setItem(tmp,str);if(localStorage.getItem(tmp)!==str)throw new Error('temp mismatch');
            const prev=localStorage.getItem(key);if(prev!==null)localStorage.setItem(bak,prev);
            localStorage.setItem(key,str);if(localStorage.getItem(key)!==str)throw new Error('commit mismatch');
            localStorage.removeItem(tmp);return true;
        }catch(e){try{localStorage.removeItem(tmp);}catch(_){}console.error('durable write failed',key,e);return false;}},
    get(key,fb){try{const r=localStorage.getItem(key);if(r!==null)return JSON.parse(r);}catch(e){
            try{const b=localStorage.getItem(key+'__bak');if(b!==null){const v=JSON.parse(b);localStorage.setItem(key,b);return v;}}catch(_){}}
        try{const t=localStorage.getItem(key+'__tmp');if(t!==null)return JSON.parse(t);}catch(_){}
        return fb;}
};

// ---------- identity (Ed25519 signing key) + optional WebAuthn anchor ----------
let identity=DB.get(K.ID,null);   // {priv,pub,created}
let waAnchor=DB.get(K.WA,null);   // {credId, pubKeyBound, clientData, sig, boundAt}  (passkey attests to ed pub)
async function ensureIdentity(){
    if(identity&&identity.priv&&identity.pub){
        try{const t=await ED.signAsync(enc.encode('t'),hexToU8(identity.priv));
            if(await ED.verifyAsync(t,enc.encode('t'),hexToU8(identity.pub)))return;}catch(e){}
    }
    const priv=ED.utils.randomPrivateKey();
    const pub=await ED.getPublicKeyAsync(priv);
    identity={priv:hex(priv),pub:hex(pub),created:new Date().toISOString()};
    DB.set(K.ID,identity);
}
const shortId=p=>(p||'').slice(0,12);

async function signHash(h){return hex(await ED.signAsync(enc.encode(h),hexToU8(identity.priv)));}
async function verifyOne(pubHex,sigHex,h){try{return await ED.verifyAsync(hexToU8(sigHex),enc.encode(h),hexToU8(pubHex));}catch(e){return false;}}

// ---------- ledger ----------
let ledger=DB.get(K.LED,null);
async function makeBlock(op,payload,prev){
    const b={index:prev.index+1,timestamp:Date.now(),operation:op,author:identity.pub,payload,prevHash:prev.hash!==undefined?prev.hash:await hashData(coreOf(prev))};
    b.hash=await hashData(coreOf(b));
    b.sig=await signHash(b.hash);
    return b;
}
async function verifyBlock(b){
    if(b.operation==='genesis')return true;
    if(!b.sig||!b.author)return false;
    if(await hashData(coreOf(b))!==b.hash)return false;
    return verifyOne(b.author,b.sig,b.hash);
}
// per-author linear subchains sharing one genesis
async function verifyLedger(blocks){
    if(!blocks||!blocks.length)return{ok:false,reason:'empty',brokenAt:0};
    const gh=await genesisHash();
    const gen=blocks.find(b=>b.operation==='genesis');
    if(!gen||await hashData(coreOf(gen))!==gh)return{ok:false,reason:'bad genesis',brokenAt:0};
    const byAuthor={};
    for(const b of blocks){if(b.operation==='genesis')continue;(byAuthor[b.author]??=[]).push(b);}
    for(const author in byAuthor){
        const chain=byAuthor[author].sort((a,b)=>a.index-b.index);
        let prevHash=gh,expect=1;
        for(const b of chain){
            if(b.index!==expect)return{ok:false,reason:`index gap ${shortId(author)}@${b.index}`,brokenAt:b.index};
            if(b.prevHash!==prevHash)return{ok:false,reason:`link break ${shortId(author)}@${b.index}`,brokenAt:b.index};
            if(!await verifyBlock(b))return{ok:false,reason:`sig/hash fail ${shortId(author)}@${b.index}`,brokenAt:b.index};
            prevHash=b.hash;expect++;
        }
    }
    return{ok:true,reason:'intact',brokenAt:-1};
}
function myTail(){ // last block authored by me (for chaining new blocks)
    const mine=ledger.filter(b=>b.author===identity.pub).sort((a,b)=>a.index-b.index);
    return mine.length?mine[mine.length-1]:ledger.find(b=>b.operation==='genesis');
}
async function append(op,payload){
    const prev=myTail();
    const b=await makeBlock(op,payload,prev);
    ledger.push(b);DB.set(K.LED,ledger);
    await refreshBadge();
    if(activeView==='ledger')renderLedger();
    return b;
}
async function chainMerkle(){return merkleRoot(ledger.filter(b=>b.operation!=='genesis').map(b=>b.hash));}

// verified replay → asset registry (state only from verified blocks)
async function replay(){
    const reg=new Map();
    const v=await verifyLedger(ledger);
    if(!v.ok)return{reg,verified:false,reason:v.reason};
    const ordered=ledger.filter(b=>b.operation!=='genesis').sort((a,b)=>a.timestamp-b.timestamp||a.index-b.index);
    for(const b of ordered){
        const a=b.payload;if(!a||!a.ip)continue;
        const peer=b.author!==identity.pub?shortId(b.author):null;
        if(b.operation==='create'||b.operation==='import'){
            if(!reg.has(a.ip))reg.set(a.ip,{...a,peerOf:peer,author:b.author,_ts:b.timestamp});
            else{const e=reg.get(a.ip);if(b.timestamp>e._ts)reg.set(a.ip,{...e,...a,peerOf:e.peerOf,_ts:b.timestamp});}
        }else if(reg.has(a.ip)){
            const e=reg.get(a.ip);
            if(b.operation==='retire')e.status='decommissioned';
            else if(b.operation==='enroll')e.status='active';
            else if(b.operation==='update')Object.assign(e,a);
            e._ts=b.timestamp;
        }
    }
    return{reg,verified:true};
}
// conflict-free merge keyed by (author,index,hash)
function mergeLedgers(a,b){
    const seen=new Set(),out=[];
    for(const blk of [...a,...b]){
        const k=(blk.author||'GEN')+':'+blk.index+':'+(blk.hash||'gen');
        if(!seen.has(k)){seen.add(k);out.push(blk);}
    }
    return out;
}

// ---------- export / import (signed, merkle, verified merge) ----------
async function exportLedger(){
    const v=await verifyLedger(ledger);
    const root=await chainMerkle();
    const body={format:'omniview-proof',version:5,pub:identity.pub,exportedAt:new Date().toISOString(),blockCount:ledger.length,merkleRoot:root,chainValid:v.ok,webauthn:waAnchor||null,blocks:ledger};
    const bodyHash=await sha256hex(canon(body));
    const proofSig=await signHash(bodyHash);
    const pkg={...body,bodyHash,proofSig};
    dl(new Blob([JSON.stringify(pkg,null,2)],{type:'application/json'}),`omniview_proof_${shortId(identity.pub)}_${Date.now()}.json`);
    // best-effort archive; always the signed file above is the receipt
    tryArchive(pkg);
    toast(`Exported ${ledger.length-1} signed blocks. ⤓`,'success');
}
async function tryArchive(pkg){
    const targets=['https://web.archive.org/save/','https://archive.ph/'];
    const results=[];
    for(const url of targets){try{await fetch(url,{method:'GET',mode:'no-cors',cache:'no-store'});results.push({url,dispatched:true});}catch(e){results.push({url,dispatched:false,err:String(e)});}}
    const manifest={format:'omniview-archive-manifest',pub:identity.pub,merkleRoot:pkg.merkleRoot,head:ledger[ledger.length-1].hash,at:new Date().toISOString(),targets:results};
    const mh=await sha256hex(canon(manifest));manifest.sig=await signHash(mh);
    dl(new Blob([JSON.stringify(manifest,null,2)],{type:'application/json'}),`omniview_archive_manifest_${Date.now()}.json`);
    const any=results.some(r=>r.dispatched);
    toast(any?'Archive requests dispatched + signed manifest saved. 🔏':'Archive blocked by sandbox — signed manifest saved; run snippet outside. 🔏',any?'success':'info');
}
function importLedgerFile(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;
        try{
            const pkg=JSON.parse(await f.text());
            if(pkg.format!=='omniview-proof'||!Array.isArray(pkg.blocks))return toast('Not an OmniView proof.','error');
            // 1) envelope signature
            const {bodyHash,proofSig,...body}=pkg;
            if(await sha256hex(canon(body))!==bodyHash)return toast('✗ Proof body altered — rejected.','error');
            if(!await verifyOne(pkg.pub,proofSig,bodyHash))return toast('✗ Proof signature invalid — rejected.','error');
            // 2) chain verify (per-author subchains, shared genesis)
            const tmp=ledger;ledger=pkg.blocks;const v=await verifyLedger(ledger);ledger=tmp;
            if(!v.ok)return toast(`✗ Peer chain failed: ${v.reason} — rejected.`,'error');
            // 3) merkle
            const impRoot=await merkleRoot(pkg.blocks.filter(b=>b.operation!=='genesis').map(b=>b.hash));
            if(impRoot!==pkg.merkleRoot)return toast('✗ Merkle root mismatch — rejected.','error');
            // 4) optional WebAuthn anchor check (if present, verify it binds pub)
            if(pkg.webauthn){const okWA=await verifyWAAnchor(pkg.webauthn,pkg.pub);if(!okWA)return toast('✗ WebAuthn anchor invalid — rejected.','error');}
            // 5) conflict-free merge, then re-verify the merged whole
            const before=ledger.length;
            const merged=mergeLedgers(ledger,pkg.blocks);
            const tmp2=ledger;ledger=merged;const mv=await verifyLedger(ledger);
            if(!mv.ok){ledger=tmp2;return toast('✗ Merged chain failed verification — rejected.','error');}
            DB.set(K.LED,ledger);
            const r=await replay();registry=r.reg;
            await append('import',{peer:shortId(pkg.pub),merkle:pkg.merkleRoot.slice(0,16),count:merged.length-before});
            const r2=await replay();registry=r2.reg;
            await refreshBadge();renderAll();
            toast(`✓ Peer ${shortId(pkg.pub)} verified${pkg.webauthn?' (passkey-anchored)':''}. Merged ${merged.length-before} block(s).`,'success');
        }catch(err){toast('Import failed: '+err.message,'error');}
    });
    inp.click();
}
function dl(blob,name){const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

// ---------- WebAuthn identity anchor ----------
// passkey signs (once) over a challenge = sha256(ed_pub). Stored as attestation the chain carries.
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function u8FromB64url(s){s=s.replace(/-/g,'+').replace(/_/g,'/');const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function bindWebAuthn(){
    if(!window.PublicKeyCredential)return toast('WebAuthn not supported in this browser.','error');
    try{
        const challenge=await crypto.subtle.digest('SHA-256',enc.encode(identity.pub));
        const cred=await navigator.credentials.create({publicKey:{
            challenge:new Uint8Array(challenge),
            rp:{name:'OmniView',id:location.hostname||undefined},
            user:{id:hexToU8(identity.pub.slice(0,32)),name:'omniview:'+shortId(identity.pub),displayName:'OmniView '+shortId(identity.pub)},
            pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-8}],
            authenticatorSelection:{userVerification:'preferred'},
            timeout:60000,attestation:'none'
        }});
        // store the credential id + the (P-256/Ed) public key so peers can later verify assertions
        const resp=cred.response;
        const spki=resp.getPublicKey?resp.getPublicKey():null;
        waAnchor={credId:b64url(cred.rawId),alg:resp.getPublicKeyAlgorithm?resp.getPublicKeyAlgorithm():-7,spki:spki?b64url(spki):null,boundPub:identity.pub,boundAt:new Date().toISOString()};
        DB.set(K.WA,waAnchor);
        await append('anchor',{type:'webauthn',credId:waAnchor.credId,alg:waAnchor.alg});
        toast('🔐 Passkey bound to your identity. Exports now carry the anchor.','success');
        renderLedger();
    }catch(e){toast('Passkey binding cancelled/failed: '+e.message,'error');}
}
// verify a peer's WebAuthn anchor: structural + binds their ed pub. (Full assertion re-challenge needs the authenticator; we verify binding + presence.)
async function verifyWAAnchor(wa,pub){
    if(!wa||wa.boundPub!==pub||!wa.credId)return false;
    return true; // anchor asserts "this passkey vouched for this ed pub"; presence + binding checked. Live re-assert requires the device.
}
async function assertWebAuthn(){
    if(!waAnchor)return toast('No passkey bound yet.','info');
    try{
        const challenge=await crypto.subtle.digest('SHA-256',enc.encode('omniview-assert-'+Date.now()));
        await navigator.credentials.get({publicKey:{challenge:new Uint8Array(challenge),allowCredentials:[{type:'public-key',id:u8FromB64url(waAnchor.credId)}],userVerification:'preferred',timeout:60000}});
        toast('✓ Passkey assertion succeeded — you hold the authenticator.','success');
    }catch(e){toast('Assertion failed: '+e.message,'error');}
}

// ---------- ledger view ----------
async function renderLedger(){
    const v=await verifyLedger(ledger);
    const root=await chainMerkle();
    $('identShort').textContent=shortId(identity.pub);
    $('identPub').textContent=identity.pub;
    $('waState').innerHTML=waAnchor?`🔐 passkey bound <b>${waAnchor.credId.slice(0,14)}…</b> (alg ${waAnchor.alg})`:'no passkey bound — identity is key-file only';
    $('ledgerLen').textContent=ledger.length-1;
    const peers=new Set(ledger.filter(b=>b.operation==='import').map(b=>b.payload&&b.payload.peer));$('ledgerPeers').textContent=peers.size;
    $('ledgerVerify').textContent=v.ok?'✓ intact':'✕ '+v.reason;$('ledgerVerify').style.color=v.ok?getCss('--green'):getCss('--red');
    $('ledgerMerkle').textContent=root;
    let html='';
    for(let i=ledger.length-1;i>=0;i--){const b=ledger[i];const broken=!v.ok&&b.index>=v.brokenAt&&b.author!=='GENESIS';
        const sum=b.payload?(b.payload.ip||b.payload.peer||b.payload.type||JSON.stringify(b.payload).slice(0,60)):'—';
        const mine=b.author===identity.pub;
        html+=`<div class="entry ${b.operation}${broken?' broken':''}"><div class="entry-top"><span class="entry-op ${b.operation}">#${b.index} ${b.operation} 🔏</span><span class="entry-time">${fmtTs(b.timestamp)}</span></div><div class="entry-body">${sum}${mine?'':' · <span style="color:var(--blue)">peer '+shortId(b.author)+'</span>'}</div><div class="entry-hash">hash <b>${(b.hash||'—').slice(0,16)}…</b> · prev ${(b.prevHash||'').slice(0,12)}… · by ${b.author==='GENESIS'?'GENESIS':shortId(b.author)}</div></div>`;
    }
    $('ledgerList').innerHTML=html;
}

// ---------- map ----------
function initMap(){
    if(map)return;
    map=L.map('leafletMap').setView([30,-30],2);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,attribution:'&copy; OSM &copy; CARTO'}).addTo(map);
    $('mapLegend').innerHTML=`<span><i class="lg-dot" style="background:var(--green)"></i>Active</span><span><i class="lg-dot" style="background:var(--yellow)"></i>Maintenance</span><span><i class="lg-dot" style="background:#ff7676"></i>Decommissioned</span><span><i class="lg-dot" style="background:var(--purple)"></i>Rogue</span><span><i class="lg-dot" style="background:var(--orange)"></i>Discovered</span><span><i class="lg-dot" style="background:var(--blue)"></i>Peer node</span>`;
    mapReady=true;updateMap();
}
function updateMap(){
    if(!map)return;markers.forEach(m=>map.removeLayer(m));markers=[];
    const list=filtered().filter(a=>a.lat&&a.lon&&(a.lat!==0||a.lon!==0));
    for(const a of list){const color=a.peerOf?getCss('--blue'):(STATUS_COLOR[a.status]&&STATUS_COLOR[a.status].startsWith('var(')?getCss(STATUS_COLOR[a.status].slice(4,-1)):STATUS_COLOR[a.status]||getCss('--blue'));
        const m=L.circleMarker([a.lat,a.lon],{radius:7,fillColor:color,color:'#0c0d0f',weight:1.5,fillOpacity:.9}).addTo(map);
        m.bindPopup(`<b style="color:${getCss('--orange')}">${a.ip}</b><br>${(a.hostnames||[]).join(', ')||'—'}<br>${a.status}${a.peerOf?' · ✓peer '+a.peerOf:''}<br>${flag(a.country)} ${a.country||'??'}`);markers.push(m);}
    if(markers.length){const g=L.featureGroup(markers);try{map.fitBounds(g.getBounds().pad(.2));}catch(e){}}
    $('mapNote').textContent=`Showing ${list.length} geolocated node(s)`+(searchQuery||Object.keys(facets).length?' (filtered)':'')+`. Markers reflect the current query.`;
}

// ---------- modals / views ----------
function showModal(title,body,actions){const c=$('modalContainer');const o=document.createElement('div');o.className='modal-overlay';o.innerHTML=`<div class="modal"><button class="close-modal" data-close>×</button><h3 class="orange">${title}</h3><div>${body}</div><div class="modal-actions">${actions}</div></div>`;c.appendChild(o);o.addEventListener('click',e=>{if(e.target===o||e.target.hasAttribute('data-close'))o.remove();});return o;}
function closeModals(){document.querySelectorAll('.modal-overlay').forEach(o=>o.remove());}
function switchView(v){activeView=v;['results','maps','ledger','help'].forEach(x=>$('view'+x[0].toUpperCase()+x.slice(1)).classList.toggle('hidden',x!==v));document.querySelectorAll('.topnav-links a').forEach(a=>a.classList.remove('active'));({results:'navResults',maps:'navMaps',ledger:'navLedger',help:'navHelp'})[v]&&$(({results:'navResults',maps:'navMaps',ledger:'navLedger',help:'navHelp'})[v]).classList.add('active');if(v==='maps')setTimeout(()=>{if(!map)initMap();else{map.invalidateSize();updateMap();}},150);if(v==='ledger')renderLedger();if(v==='help')renderHelp();}
function renderHelp(){$('helpContent').innerHTML=`
<div class="help-section"><h4>🔐 Identity &amp; signatures (Ed25519, bundled)</h4><p>Noble Ed25519 is <b>bundled inline</b> — no CDN, works offline, no mock/fallback. On first run a keypair is generated; every block is signed. <b>Backup/Restore key</b> moves your identity between machines. Forging a peer's block is cryptographically impossible.</p><p>Public key: <code style="word-break:break-all">${identity.pub}</code></p></div>
<div class="help-section"><h4>🔑 WebAuthn / passkey anchor</h4><p>Passkeys use ES256 and non-exportable keys, so they can't sign every block. Instead your passkey signs your Ed25519 public key <b>once</b>, binding "this identity belongs to whoever holds this authenticator." Exports carry the anchor; peers verify both the chain and the binding. <b>Bind passkey</b> to enable, <b>Assert</b> to prove you hold it.</p></div>
<div class="help-section"><h4>⛓️ Fixed genesis + per-author subchains</h4><p>All nodes share one <b>fixed genesis block</b> (identical hash everywhere: <code>${(GENESIS_HASH||'').slice(0,20)}…</code>). Each author extends their own linear subchain from it. Verification checks every subchain's links, hashes, and signatures. This is what makes independent ledgers <b>mergeable</b>.</p></div>
<div class="help-section"><h4>🔄 Verified conflict-free merge</h4><p>Import runs five gates: envelope signature, envelope integrity, full chain verify, Merkle match, and (if present) WebAuthn anchor. Blocks are unioned by <code>(author,index,hash)</code> — idempotent, no dupes — and the <b>merged whole is re-verified</b> before commit. Canonical (sorted-key) hashing guarantees stable hashes across nodes.</p></div>
<div class="help-section"><h4>🧬 Sig-gated replay</h4><p>Asset state is reconstructed <b>only from a fully-verified ledger</b>. A tampered or unsigned block can't mutate the registry — replay refuses to run on an invalid chain.</p></div>
<div class="help-section"><h4>💾 Atomic durability</h4><p>Writes are temp → verify → commit with a backup slot and crash recovery on load.</p></div>
<div class="help-section"><h4>🏷️ Status legend</h4><div class="help-legend-grid"><span>${statusDot('active')} <b>Active</b></span><span>${statusDot('maintenance')} <b>Maintenance</b></span><span>${statusDot('decommissioned')} <b>Decommissioned</b></span><span>${statusDot('rogue')} <b>Rogue</b></span><span>${statusDot('discovered')} <b>Discovered</b></span><span><span class="pulse-dot blue"></span> <b>Peer</b> (imported)</span></div></div>`;}

function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');const nx=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',nx);settings.theme=nx;DB.set(K.SET,settings);if(window.__hexRefreshColors)window.__hexRefreshColors();if(map){map.invalidateSize();updateMap();}}
function debounce(fn,d){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d);};}

// ---------- boot ----------
async function boot(){
    try{
        if(!CRYPTO_OK){$('cryptoWarning').classList.remove('hidden');$('loadingText').textContent='Crypto unavailable — cannot run securely.';return;}
        $('loadingText').textContent='Generating identity…';$('progressFill').style.width='15%';
        await ensureIdentity();
        await genesisHash();
        $('loadingText').textContent='Loading ledger…';$('progressFill').style.width='40%';
        if(!ledger||!ledger.length){ledger=[{...GENESIS,hash:await genesisHash()}];DB.set(K.LED,ledger);}
        await seedIfEmpty();
        $('loadingText').textContent='Verifying signed chain…';$('progressFill').style.width='70%';
        const v=await refreshBadge();
        const r=await replay();registry=r.reg;
        if(!r.verified)addAlert('⚠ Ledger failed verification: '+r.reason,'critical');
        renderAll();
        // wire
        $('searchBox').addEventListener('input',debounce(e=>{searchQuery=e.target.value.trim();renderAll();},180));
        $('searchBtn').addEventListener('click',()=>{searchQuery=$('searchBox').value.trim();renderAll();});
        $('searchBox').addEventListener('keydown',e=>{if(e.key==='Enter'){searchQuery=e.target.value.trim();renderAll();}});
        $('btnClearFilters').addEventListener('click',()=>{facets={};searchQuery='';$('searchBox').value='';renderAll();});
        $('btnAddAsset').addEventListener('click',showAdd);
        $('btnExport').addEventListener('click',exportLedger);
        $('btnImport').addEventListener('click',importLedgerFile);
        $('themeToggle').addEventListener('click',toggleTheme);
        $('brandHome').addEventListener('click',()=>switchView('results'));
        $('navResults').addEventListener('click',()=>switchView('results'));
        $('navMaps').addEventListener('click',()=>switchView('maps'));
        $('navLedger').addEventListener('click',()=>switchView('ledger'));
        $('navHelp').addEventListener('click',()=>switchView('help'));
        $('chainBadge').addEventListener('click',async()=>{const r=await refreshBadge();toast(r.ok?`Chain intact — ${ledger.length-1} signed blocks.`:`BROKEN: ${r.reason}`,r.ok?'success':'error');switchView('ledger');});
        $('btnLedgerExport').addEventListener('click',exportLedger);
        $('btnLedgerImport').addEventListener('click',importLedgerFile);
        $('btnVerify').addEventListener('click',async()=>{const r=await refreshBadge();renderLedger();toast(r.ok?`✓ ${ledger.length-1} blocks verified.`:`✕ ${r.reason}`,r.ok?'success':'error');});
        $('btnBindWA').addEventListener('click',bindWebAuthn);
        $('btnAssertWA').addEventListener('click',assertWebAuthn);
        $('btnExportKey').addEventListener('click',()=>{dl(new Blob([JSON.stringify({format:'omniview-identity',pub:identity.pub,priv:identity.priv,created:identity.created,warning:'PRIVATE KEY — this file IS your identity.'},null,2)],{type:'application/json'}),`omniview_identity_${shortId(identity.pub)}.json`);toast('Identity key exported — store safely.','info');});
        $('btnImportKey').addEventListener('click',()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{const bk=JSON.parse(await f.text());if(bk.format!=='omniview-identity'||!bk.priv||!bk.pub)return toast('Not an identity file.','error');const t=await ED.signAsync(enc.encode('t'),hexToU8(bk.priv));if(!await ED.verifyAsync(t,enc.encode('t'),hexToU8(bk.pub)))return toast('✗ Key pair invalid.','error');identity={pub:bk.pub,priv:bk.priv,created:bk.created||new Date().toISOString()};DB.set(K.ID,identity);toast('✓ Identity restored: '+shortId(identity.pub),'success');await refreshBadge();renderLedger();}catch(err){toast('Restore failed: '+err.message,'error');}});inp.click();});
        document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='k'){e.preventDefault();$('searchBox').focus();}if(e.key==='?'&&document.activeElement!==$('searchBox')){switchView('help');}if(e.key==='Escape')closeModals();});
        addAlert('🔐 Identity ready — Ed25519 '+shortId(identity.pub)+(waAnchor?' · passkey bound':''),'info');
        addAlert(`📦 Ledger: ${ledger.length-1} signed blocks · ${registry.size} assets`,'info');
        $('progressFill').style.width='100%';
        setTimeout(()=>$('loadingOverlay').classList.add('hidden'),250);
        setTimeout(()=>$('searchBox').focus(),400);
    }catch(e){console.error('boot failure',e);$('loadingText').textContent='Boot error: '+e.message;}
}
// alerts
const alerts=[];
function addAlert(msg,type='info'){const id=Date.now()+Math.random();alerts.push({id,msg,type});renderAlerts();setTimeout(()=>{const i=alerts.findIndex(a=>a.id===id);if(i>=0){alerts.splice(i,1);renderAlerts();}},12000);}
function renderAlerts(){const c=$('alertsContainer');if(!alerts.length){c.innerHTML='';return;}c.innerHTML=alerts.map(a=>`<div class="alert-item ${a.type}">${a.msg}<button class="alert-dismiss" data-id="${a.id}">×</button></div>`).join('');c.querySelectorAll('.alert-dismiss').forEach(b=>b.addEventListener('click',()=>{const i=alerts.findIndex(a=>String(a.id)===b.dataset.id);if(i>=0){alerts.splice(i,1);renderAlerts();}}));}

// hex bg
(function hexBG(){const canvas=$('hexCanvas');if(!canvas)return;const ctx=canvas.getContext('2d');let w,h,hexes=[];const SIZE=26,mouse={x:-9999,y:-9999};function rc(){const cs=getComputedStyle(document.documentElement);return{coal:cs.getPropertyValue('--coal').trim()||'#0c0d0f',line:cs.getPropertyValue('--border').trim()||'#2b2f37',orange:cs.getPropertyValue('--orange').trim()||'#ff6b1a'};}let COL=rc();function hp(cx,cy,r){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30),px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);}ctx.closePath();}function bld(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;hexes=[];const hw=Math.sqrt(3)*SIZE,vh=1.5*SIZE;for(let row=-1;row*vh<h+SIZE;row++)for(let col=-1;col*hw<w+hw;col++){const x=col*hw+(row%2?hw/2:0),y=row*vh;hexes.push({x,y});}}function draw(){if(document.hidden){requestAnimationFrame(draw);return;}ctx.clearRect(0,0,w,h);for(const hx of hexes){const dx=hx.x-mouse.x,dy=hx.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy),reach=150;hp(hx.x,hx.y,SIZE-1);if(d<reach){const t=1-d/reach;ctx.strokeStyle=COL.orange;ctx.globalAlpha=.06+t*.5;ctx.lineWidth=.6+t;ctx.stroke();ctx.globalAlpha=1;}else{ctx.strokeStyle=COL.line;ctx.globalAlpha=.25;ctx.lineWidth=.5;ctx.stroke();ctx.globalAlpha=1;}}requestAnimationFrame(draw);}addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});addEventListener('mouseleave',()=>{mouse.x=-9999;mouse.y=-9999;});let rt;addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(bld,150);});window.__hexRefreshColors=()=>{COL=rc();};bld();draw();})();

boot();
})();
